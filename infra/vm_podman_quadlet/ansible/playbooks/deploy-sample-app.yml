---
- name: Deploy sample-app to vm
  become: true
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Wait for host to become reachable
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 300
  roles:
    - podman 
    - sample_app

- name: Print host ips to the console
  hosts: all
  tasks:
    - ansible.builtin.debug:
        msg: 'Application available at:'
      run_once: true

    - ansible.builtin.debug:
        msg: 'http://{{ansible_host}}' 
...
